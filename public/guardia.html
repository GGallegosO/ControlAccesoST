<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Guardia - Control Acceso SJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <nav class="navbar navbar-dark bg-primary px-3">
        <span class="navbar-brand mb-0 h1">Sistema de Asistencia - Portería</span>
        <div>
            <span id="nombre-guardia" class="text-white me-3"></span>
            <button id="logout-btn" class="btn btn-sm btn-light">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="alert alert-warning">
            <h4 class="mb-0">📋 Registro de Visitas de Hoy</h4>
        </div>

        <div class="table-responsive bg-white p-3 rounded shadow-sm mt-3">
            <table class="table table-hover table-bordered">
                <thead class="table-light">
                    <tr>
                        <th>Hora</th>
                        <th>Visitante</th>
                        <th>RUT/Pasaporte</th>
                        <th>Anfitrión</th>
                        <th>Unidad</th>
                        <th>Vehículo</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla-visitas">
                    <tr>
                        <td colspan="7" class="text-center text-muted">Cargando visitas de hoy...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/guardia.js"></script>
</body>
</html>
