<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Acceso SJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .login-container { max-width: 400px; margin: 50px auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-light">
    
    <!-- Formulario de Login -->
    <div id="login-section" class="login-container">
        <h3 class="text-center text-primary mb-4">Control Acceso SJ</h3>
        <h6 class="text-center text-muted mb-4">Sede San Joaquín</h6>
        
        <form id="login-form">
            <div class="mb-3">
                <label for="username" class="form-label">Correo Institucional</label>
                <input type="email" class="form-control" id="username" placeholder="nombre@santotomas.cl" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <div id="error-msg" class="alert alert-danger hidden"></div>
            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
        <div class="mt-3 text-center small text-muted">
            <p><strong>Credenciales de Prueba:</strong></p>
            <p class="mb-1">🔑 Contraseña para todos: <code>1234</code></p>
            <hr class="my-2">
            <p class="mb-1">👤 Admin: <code>admin@santotomas.cl</code></p>
            <p class="mb-1">👨‍💻 Funcionario: <code>pedro@santotomas.cl</code></p>
            <p class="mb-1">👮 Guardia: <code>juan@santotomas.cl</code></p>
        </div>
    </div>

    <!-- Dashboard (Se muestra tras login) -->
    <div id="dashboard-section" class="container-fluid hidden">
        <nav class="navbar navbar-dark bg-primary px-3">
            <span class="navbar-brand mb-0 h1">Sistema de Asistencia</span>
            <button id="logout-btn" class="btn btn-sm btn-light">Cerrar Sesión</button>
        </nav>
        <div class="container mt-4">
            <h2 id="welcome-msg">Bienvenido</h2>
            <div id="role-content" class="mt-3"></div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const errorMsg = document.getElementById('error-msg');
        const welcomeMsg = document.getElementById('welcome-msg');
        const roleContent = document.getElementById('role-content');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Guardar usuario en sessionStorage
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    showDashboard(data.user);
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError('Error de conexión con el servidor');
            }
        });

        function showDashboard(user) {
            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            
            // NORMALIZAR EL ROL A MINÚSCULAS AQUÍ
            const rolNormalizado = user.rol ? user.rol.toLowerCase() : '';
            
            welcomeMsg.innerText = `Hola, ${user.nombre} (${rolNormalizado.toUpperCase()})`;

            let content = '';
            // Ahora las comparaciones funcionarán porque usamos la variable normalizada
            if (rolNormalizado === 'admin') {
                content = '<div class="alert alert-success"><h4>Panel de Administrador</h4><p>Acceso total a reportes, usuarios y unidades.</p></div>';
                // Aquí llamaremos luego a la función para cargar estadísticas
            } else if (rolNormalizado === 'funcionario') {
                content = '<div class="alert alert-info"><h4>Panel de Funcionario</h4><p>Gestión de eventos y asistencia de su unidad.</p></div>';
            } else if (rolNormalizado === 'guardia') {
                content = '<div class="alert alert-warning"><h4>Panel de Guardia</h4><p>Registro de ingresos efectivos del día.</p></div>';
            } else {
                content = '<div class="alert alert-danger">Rol de usuario no reconocido.</div>';
            }
            roleContent.innerHTML = content;
        }

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
            setTimeout(() => errorMsg.classList.add('hidden'), 3000);
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            sessionStorage.removeItem('user');
            location.reload();
        });

        // Verificar si ya hay sesión
        const savedUser = sessionStorage.getItem('user');
        if (savedUser) {
            showDashboard(JSON.parse(savedUser));
        }
    </script>
</body>
</html>
