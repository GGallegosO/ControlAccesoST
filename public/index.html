<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Control Acceso SJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .login-container { max-width: 400px; margin: 50px auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-light">
    
    <div id="login-section" class="login-container">
        <h3 class="text-center text-primary mb-4">Control Acceso SJ</h3>
        <h6 class="text-center text-muted mb-4">Sede San Joaquín</h6>
        
        <form id="login-form">
            <div class="mb-3">
                <label for="username" class="form-label">Correo Institucional</label>
                <input type="email" class="form-control" id="username" placeholder="nombre@santotomas.cl" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <div id="error-msg" class="alert alert-danger hidden"></div>
            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        // 1. Verificar si ya hay sesión activa para saltarse el login
        const savedUser = sessionStorage.getItem('user');
        if (savedUser) {
            redirigirSegunRol(JSON.parse(savedUser).rol);
        }

        // 2. Manejo del formulario
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    redirigirSegunRol(data.user.rol);
                } else {
                    showError(data.message);
                }
            } catch (err) {
                showError('Error de conexión con el servidor');
            }
        });

        // 3. El "Viaje" hacia la otra página
        function redirigirSegunRol(rol) {
            const rolNormalizado = rol ? rol.toLowerCase() : '';
            
            if (rolNormalizado === 'admin') {
                window.location.href = '/admin.html';
            } else if (rolNormalizado === 'funcionario') {
                window.location.href = '/funcionario.html';
            } else if (rolNormalizado === 'guardia') {
                window.location.href = '/guardia.html';
            } else {
                showError('Rol no reconocido');
                sessionStorage.removeItem('user');
            }
        }

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
            setTimeout(() => errorMsg.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
